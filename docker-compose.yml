# Argos local infrastructure services.
#
# Services: Redis (online features), Zookeeper + Kafka (streaming ingest),
#           api (the FastAPI prediction service — built from ./Dockerfile).
#
# Bring up everything:   docker compose up -d
# Bring up infra only:   docker compose up -d redis zookeeper kafka
# Rebuild API image:     docker compose build api
# API logs:              docker compose logs -f api
# Tear down:             docker compose down

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: argos-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: argos-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      # Host apps (producer.py on your laptop) connect via localhost:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: argos-redis
    ports:
      - "6380:6379"
    # maxmemory-policy: when the cache fills up, evict the least-recently-used
    # key. 
    command:
      - redis-server
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    # Build from the Dockerfile in this repo. Image tag is `argos-api:dev`
    # so the same image name works in `docker run` and future k8s manifests.
    build: .
    image: argos-api:dev
    container_name: argos-api
    ports:
      - "8000:8000"
    # Pull DATABASE_URL / KAFKA_* / etc. from the host .env file.
    env_file:
      - .env
    environment:
      # Inside the docker network, the redis service is reachable as
      # `redis:6379` regardless of what host port we mapped above. Override
      # whatever the user has in .env (which points at localhost:6380).
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
