# Example Secret — DO NOT commit real credentials.
#
# Option A — imperative (recommended; nothing sensitive in the repo):
#   kubectl create secret generic argos-api-secrets -n argos \
#     --from-literal=DATABASE_URL='postgresql://USER:PASS@HOST:5432/postgres?sslmode=require'
#
# Option B — copy this file to secret-argos-api.yaml (gitignored), edit stringData, then apply.
#
# The Deployment reads key DATABASE_URL with optional: true. If the Secret
# does not exist, the API still starts; predictions use Redis (ConfigMap).

apiVersion: v1
kind: Secret
metadata:
  name: argos-api-secrets
  namespace: argos
type: Opaque
stringData:
  DATABASE_URL: "postgresql://USER:PASSWORD@HOST:5432/postgres?sslmode=require"


# This is just a placeholder for the actual secret, no secrets are needed for this project to work.