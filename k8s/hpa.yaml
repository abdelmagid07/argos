# Horizontal Pod Autoscaler: adjusts Deployment.spec.replicas from CPU usage.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: argos-api
  namespace: argos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: argos-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
